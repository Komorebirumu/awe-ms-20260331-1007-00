<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" aria-label="AI-Powered Niche Botanical Illustration Enhancer">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />

  <!-- Main Icon: Stylized Plant with AI Element -->
  <g transform="translate(400 300) scale(1.2)">
    <!-- Stylized Leaf/Petal -->
    <path d="M0 -80 C-30 -50 -30 -20 0 -10 C30 -20 30 -50 0 -80 Z" fill="#28a745" transform="rotate(0)" />
    <path d="M0 -80 C-30 -50 -30 -20 0 -10 C30 -20 30 -50 0 -80 Z" fill="#34c759" transform="rotate(120)" />
    <path d="M0 -80 C-30 -50 -30 -20 0 -10 C30 -20 30 -50 0 -80 Z" fill="#6fbf74" transform="rotate(240)" />

    <!-- AI Brain/Network Element -->
    <circle cx="0" cy="20" r="25" fill="#007bff" />
    <circle cx="-15" cy="10" r="5" fill="#ffffff" opacity="0.8" />
    <circle cx="15" cy="10" r="5" fill="#ffffff" opacity="0.8" />
    <circle cx="0" cy="-5" r="5" fill="#ffffff" opacity="0.8" />
    <line x1="-10" y1="15" x2="10" y2="-15" stroke="#ffffff" stroke-width="2" opacity="0.8" />
    <line x1="10" y1="15" x2="-10" y2="-15" stroke="#ffffff" stroke-width="2" opacity="0.8" />
  </g>

  <!-- Title Text -->
  <text x="50%" y="80" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#343a40">
    AI-Powered Niche Botanical Illustration Enhancer
  </text>

  <!-- Subtitle/Tagline -->
  <text x="50%" y="130" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6c757d">
    Elevating Your Botanical Art with Intelligent Enhancement
  </text>

  <!-- Feature Icons -->
  <!-- Icon 1: Magnifying Glass (Detail Enhancement) -->
  <g transform="translate(150 450)">
    <circle cx="30" cy="30" r="25" fill="#ffc107" />
    <path d="M20,20 L40,40" stroke="#ffffff" stroke-width="3" fill="none" />
    <circle cx="20" cy="20" r="5" fill="#ffffff" />
    <circle cx="40" cy="40" r="5" fill="#ffffff" />
    <path d="M28,28 Q32,24 36,28 Q32,32 28,28 Z" fill="#ffffff" />
  </g>
  <text x="150" y="520" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#495057">Detail Enhancement</text>

  <!-- Icon 2: Paintbrush/Stylus (Artistic Refinement) -->
  <g transform="translate(400 450)">
    <rect x="15" y="20" width="30" height="40" rx="5" fill="#17a2b8" />
    <path d="M30 60 L30 80 L35 75 Z" fill="#ffffff" />
    <line x1="30" y1="20" x2="30" y2="10" stroke="#ffffff" stroke-width="3" />
    <line x1="25" y1="15" x2="35" y2="15" stroke="#ffffff" stroke-width="3" />
  </g>
  <text x="400" y="520" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#495057">Artistic Refinement</text>

  <!-- Icon 3: Cogwheel with Spark (AI Processing/Intelligence) -->
  <g transform="translate(650 450)">
    <circle cx="30" cy="30" r="25" fill="#6610f2" />
    <circle cx="30" cy="30" r="15" fill="#ffffff" />
    <g transform="translate(30 30) rotate(45)">
      <rect x="-8" y="-18" width="16" height="16" rx="2" fill="#ffc107" />
      <rect x="-8" y="2" width="16" height="16" rx="2" fill="#ffc107" />
      <rect x="-18" y="-8" width="16" height="16" rx="2" fill="#ffc107" />
      <rect x="2" y="-8" width="16" height="16" rx="2" fill="#ffc107" />
    </g>
  </g>
  <text x="650" y="520" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#495057">AI Processing</text>
</svg>